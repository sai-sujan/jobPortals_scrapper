run:
  request_timeout_seconds: 20
  sleep_between_requests_seconds: 1.0
  max_detail_pages_per_site: 30
  parallel_workers: 4
  max_site_duration_seconds: 300
  priority_max_site_duration_seconds: 1200
  slow_site_threshold_seconds: 900
  slow_site_minimum_runs: 1
  usa_only: true
  usa_search_suffix: United States
  c2c_only: true
  c2c_mode: compatible_review
  search_terms:
  - python
  - python developer
  - python engineer
  - backend python
  - software engineer python
  - django developer
  - fastapi developer
  - flask developer
  - api developer
  - rest api developer
  - data engineer
  - data engineer python
  - etl developer
  - sql python
  - aws python
  - azure python
  - machine learning engineer
  - ai engineer
  - llm engineer
  - generative ai engineer
  - gen ai
  - rag engineer
  - langchain developer
  - openai developer
  - python c2c
  - python corp to corp
  - data engineer c2c
  - machine learning c2c
